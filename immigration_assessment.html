const PATHWAY_LABELS = {
  executive: { name: 'Executive & Professional Category', desc: 'For individuals with advanced education and significant professional experience — including EB-1, EB-2, and NIW categories.' },
  business:  { name: 'Business & Investment Category',  desc: 'For entrepreneurs, business owners, and investors — including E-2 and EB-5 visas.' },
  employment:{ name: 'Employment Category',             desc: 'Skill-based pathways for qualified professionals sponsored by U.S. employers — including EB-2 and EB-3.' },
  education: { name: 'Education Category',              desc: 'Immigration options through accredited U.S. academic programs.' },
  family:    { name: 'Family-Based Category',           desc: 'Pathways based on close family relationships with U.S. citizens or lawful permanent residents.' }
};

function computePathways() {
  const scores = { executive:0, business:0, employment:0, education:0, family:0 };
  const edu=answers['q5']||'', exp=answers['q7']||'', leadership=answers['q8']||'';
  const recognition=answers['q9']||[], situation=answers['q10']||'';
  const bizInterest=answers['q11']||'', investment=answers['q12']||'';
  const studyInterest=answers['q13']||'', family=answers['q14']||'', goal=answers['q4']||'';
  const highEdu=["Bachelor's Degree","Master's Degree","Doctorate (PhD)"].includes(edu);
  const highExp=['5–10 years','More than 10 years'].includes(exp);
  if(highEdu&&highExp){scores.executive+=3;if(["Master's Degree","Doctorate (PhD)"].includes(edu))scores.executive+=2;if(leadership==='Yes')scores.executive+=2;if(!recognition.includes('None of the Above')&&recognition.length>0)scores.executive+=recognition.length;}
  if(['Business Owner','Entrepreneur','Investor'].includes(situation)&&['Yes','Maybe'].includes(bizInterest)){scores.business+=3;if(!['Under $50,000','Prefer Not To Say'].includes(investment)&&investment)scores.business+=2;if(['Starting or Expanding a Business','Investment Opportunities'].includes(goal))scores.business+=1;}
  if(['Skilled Professional','Employee','Self-Employed'].includes(situation)){scores.employment+=2;if(highExp)scores.employment+=1;}
  if(['Yes','Maybe'].includes(studyInterest))scores.education+=['Business Owner','Investor'].includes(situation)?1:2;
  if(family==='Yes')scores.family+=3;
  const ranked=Object.entries(scores).filter(([,v])=>v>0).sort((a,b)=>b[1]-a[1]).slice(0,3).map(([k])=>PATHWAY_LABELS[k]);
  if(!ranked.length)ranked.push(PATHWAY_LABELS.employment);
  return ranked;
}

function block(s) {
  const cls=s.k==='read'?'block-read':s.k==='listen'?'block-listen':s.k==='tip'?'block-tip':s.k==='chemistry'?'block-chemistry':'block-hold';
  return `<div class="block ${cls}"><div class="block-label">${s.l}</div><div class="block-text">${s.t}</div></div>`;
}

function chemistryBlock(qid, val) {
  if(!CHEMISTRY[qid]||!CHEMISTRY[qid][val]) return '';
  return block({k:'chemistry', l:'💬 Bridge — Read to client', t:CHEMISTRY[qid][val]});
}

function setProgress(num, label) {
  const pct=num?Math.round((num/totalQ)*100):currentId==='results'||currentId==='hold'?currentId==='hold'?95:100:0;
  const bar=document.getElementById('progress');
  bar.style.width=pct+'%';
  document.getElementById('progress-pct').textContent=pct+'%';
  document.getElementById('progress-label').textContent=label||'';
  // Score indicator based on answers quality
  let pts = 0;
  const q = answers;
  if(['25–34','35–44'].includes(q['q1'])) pts+=2;
  else if(['45–54','55–64'].includes(q['q1'])) pts+=1;
  if(["Bachelor's Degree","Master's Degree","Doctorate (PhD)"].includes(q['q5'])) pts+=2;
  else if(['Associate Degree','Trade School'].includes(q['q5'])) pts+=1;
  if(['5–10 years','More than 10 years'].includes(q['q7'])) pts+=2;
  else if(['2–5 years'].includes(q['q7'])) pts+=1;
  if(q['q8']==='Yes') pts+=1;
  if(q['q9']&&q['q9'].length>0&&!q['q9'].includes('None of the Above')) pts+=1;
  if(['Business Owner','Entrepreneur','Investor'].includes(q['q10'])) pts+=2;
  else if(['Skilled Professional'].includes(q['q10'])) pts+=1;
  if(['Yes','Maybe'].includes(q['q11'])) pts+=1;
  if(q['q14']==='Yes') pts+=1;
  const answeredCount = Object.keys(q).filter(k=>k.startsWith('q')&&q[k]).length;
  const si=document.getElementById('score-indicator');
  if(si && answeredCount >= 3) {
    if(pts>=8){bar.style.background='#16a34a';si.textContent='🟢 Strong profile';}
    else if(pts>=5){bar.style.background='#f59e0b';si.textContent='🟡 Good profile';}
    else if(pts>=2){bar.style.background='#3b82f6';si.textContent='🔵 Building profile';}
    else{bar.style.background='#3b82f6';si.textContent='';}
  } else if(si) { si.textContent=''; bar.style.background='#3b82f6'; }
}

async function fetchCountryFact(country) {
  const factEl = document.getElementById('country-fact');
  if(!factEl) return;
  factEl.innerHTML = '<span style="color:#6b7280;font-size:12px">✨ Loading...</span>';
  try {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 100,
        messages: [{
          role: 'user',
          content: `You are a friendly sales agent chatting naturally with a client from ${country}. Write ONE short casual sentence to build rapport. Use simple everyday English — short words, no complex vocabulary. Start with a warm natural opener like "Oh nice!" or "Beautiful country!" or "Love that place!", then add ONE well-known fact — it can be about food, a landmark, geography, or something the country is famous for. Keep it light and friendly. Max 20 words. Examples: "Oh nice! Italy has the best pizza and pasta in the world, no question." or "Beautiful country! Brazil is home to the Amazon, the biggest rainforest on earth." or "Love that place! Japan is known for being one of the safest countries in the world." or "Oh great! Mexico is famous for its incredible food and ancient Mayan ruins." Just the sentence, nothing else.`
        }]
      })
    });
    const data = await res.json();
    const text = data.content?.[0]?.text || '';
    answers['country_fact'] = text;
    if(factEl) factEl.innerHTML = `<div class="block block-chemistry"><div class="block-label">💬 Say to client</div><div class="block-text">${text}</div></div>`;
  } catch(e) {
    if(factEl) factEl.innerHTML = '';
  }
}

  const fields={COMMENTS:summary};
  if(answers['q2'])fields['UF_CRM_1449131599']=answers['q2'];
  if(answers['q3']&&MARITAL_IDS[answers['q3']])fields['UF_CRM_1500181612']=MARITAL_IDS[answers['q3']];

async function loadLead(){
  if(!leadId)return;
  try{const res=await fetch(`${WEBHOOK}crm.lead.get?ID=${leadId}`);const data=await res.json();if(data.result){const ld=data.result;clientName=[ld.NAME,ld.LAST_NAME].filter(Boolean).join(' ')||'Client';
        firstName=clientName.split(' ')[0]||'';
        // Fetch agent name
        const agentId = ld.ASSIGNED_BY_ID;
        if(agentId) {
          try {
            const agentRes = await fetch(`${WEBHOOK}user.get?filter[ID]=${agentId}`);
            const agentData = await agentRes.json();
            if(agentData.result && agentData.result.length > 0) {
              const agent = agentData.result[0];
              agentName = [agent.NAME, agent.LAST_NAME].filter(Boolean).join(' ');
            }
          } catch(e) { console.log('Could not load agent:', e); }

}

.obj-overlay.open { display: flex; align-items: flex-end; justify-content: center; }
.obj-modal { background: #fff; border-radius: 16px 16px 0 0; width: 100%; max-width: 680px; max-height: 85vh; overflow-y: auto; padding: 20px; }

<button class="obj-fab" onclick="openObj()">🛡️ Objections</button>

      <div class="obj-title">🛡️ Objection Handlers</div>

<script>
function openObj() {
  document.getElementById('obj-overlay').classList.add('open');
  renderObj();
  generateAllResponses();
}

let objResponses = {};
let objLoading = false;

async function generateAllResponses() {
  if(objLoading || Object.keys(objResponses).length > 0) return;
  objLoading = true;
  
  const pathways = computePathways();
  const profile = {
    name: firstName || 'the client',
    country: answers['q2'] || 'their country',
    goal: answers['q4'] || 'immigrate to the United States',
    profession: answers['q6'] || 'professional',
    experience: answers['q7'] || '',
    education: answers['q5'] || '',
    situation: answers['q10'] || '',
    pathway: pathways[0]?.name || 'Employment Category',
    pathway2: pathways[1]?.name || ''
  };

  const objList = [
    {key:'expensive', q:'$250 is too expensive'},
    {key:'think', q:'I need to think about it'},
    {key:'spouse', q:'I want to talk to my spouse / family first'},
    {key:'pay_later', q:'Can I pay later?'},
    {key:'no_qualify', q:'What if I do not qualify after paying?'},
    {key:'legit', q:'How do I know this is legit?'},
    {key:'free', q:'I have seen other companies offering this for free'},
    {key:'scammed', q:'I have been scammed before'},
    {key:'not_lawyer', q:'Are you a real immigration lawyer?'},
    {key:'writing', q:'Can you send me something in writing first?'},
    {key:'email', q:'Send me an email'},
    {key:'not_ready', q:'I am not ready yet'},
    {key:'few_months', q:'Maybe in a few months'},
    {key:'sort_things', q:'I need to sort some things out first'},
    {key:'real_chance', q:'Do you think I really have a chance?'},
    {key:'english', q:'My English is not good enough'},
    {key:'too_old', q:'I am too old for this'},
    {key:'criminal', q:'I have a criminal record'},
    {key:'visa_denied', q:'I have been denied a visa before'},
    {key:'how_long', q:'How long does the process take?'},
    {key:'leave_country', q:'Do I need to leave my country?'},
    {key:'chances', q:'What are my chances of success?'}
  ];

  const loadingEl = document.getElementById('obj-loading');
  if(loadingEl) loadingEl.style.display = 'block';

  const prompt = `You are an expert immigration sales coach. Generate personalized objection-handling responses for a specific client.

Client profile:
- Name: ${firstName||"the client"}
- Country: ${profile.country}  
- Goal in the US: ${profile.goal}
- Profession: ${profile.profession}
- Experience: ${profile.experience}
- Education: ${profile.education}
- Current situation: ${profile.situation}
- Top immigration pathway identified: ${profile.pathway}
${profile.pathway2 ? '- Second pathway: ' + profile.pathway2 : ''}

For each objection below, write a short persuasive response (2-4 sentences) the agent reads directly to the client.
Rules:
- Start each response with the client name: ${firstName||"the client"}
- Reference their specific profile details (country, profession, goal, pathway)
- Warm, confident, conversational tone
- No bullet points inside responses
- Responses in English only

Return ONLY a JSON object with this exact format (no markdown, no backticks):
{"expensive":"response here","think":"response here","spouse":"response here","pay_later":"response here","no_qualify":"response here","legit":"response here","free":"response here","scammed":"response here","not_lawyer":"response here","writing":"response here","email":"response here","not_ready":"response here","few_months":"response here","sort_things":"response here","real_chance":"response here","english":"response here","too_old":"response here","criminal":"response here","visa_denied":"response here","how_long":"response here","leave_country":"response here","chances":"response here"}`;

  try {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 4000,
        messages: [{ role: 'user', content: prompt }]
      })
    });
    const data = await res.json();
    const text = data.content?.[0]?.text || '{}';
    const clean = text.replace(/```json|```/g, '').trim();
    objResponses = JSON.parse(clean);
    renderObj();
  } catch(e) {
    console.log('AI objections error:', e);
  } finally {
    objLoading = false;
    if(loadingEl) loadingEl.style.display = 'none';
  }
}
function closeObj(e) {
  if(!e || e.target===document.getElementById('obj-overlay')) {
    document.getElementById('obj-overlay').classList.remove('open');
  }
}

function resetObjResponses() {
  objResponses = {};
  objLoading = false;
}
function toggleObj(el) {
  const ans = el.nextElementSibling;
  const isOpen = ans.classList.contains('show');
  document.querySelectorAll('.obj-ans').forEach(a=>a.classList.remove('show'));
  document.querySelectorAll('.obj-q').forEach(q=>q.classList.remove('open'));
  if(!isOpen) { ans.classList.add('show'); el.classList.add('open'); }
}

function getPersonalizedAnswer(key) {
  const situation = answers['q10']||'';
  const edu = answers['q5']||'';
  const exp = answers['q7']||'';
  const country = answers['q2']||'your country';
  const goal = answers['q4']||'';
  const pathways = computePathways();
  const topPathway = pathways[0]?.name || 'the identified pathway';
  const highExp = ['5–10 years','More than 10 years'].includes(exp);
  const highEdu = ["Bachelor's Degree","Master's Degree","Doctorate (PhD)"].includes(edu);
  const profileStrength = highEdu && highExp ? 'very strong' : highEdu || highExp ? 'solid' : 'relevant';
  const namePrefix = firstName ? firstName + ', ' : '';
  const spouseName = answers['spouse_name'] ? answers['spouse_name'].split(' ')[0] : '';
  const spouseRef = spouseName ? spouseName : (answers['q3']==='Married' ? 'your spouse' : 'your partner');

  const goalText = {
    'Career Opportunities': 'advance your career in the United States',
    'Starting or Expanding a Business': 'build or expand your business in the United States',
    'Investment Opportunities': 'pursue investment opportunities in the United States',
    'Education': 'study and build a future in the United States',
    'Family Relocation': 'relocate your family to the United States',
    'Exploring My Options': 'find the best path forward to the United States'
  }[goal] || 'build a future in the United States';

  const objections = {
    expensive: namePrefix + "I completely understand — and I want to be honest with you. The $250 is not a big commitment compared to what is at stake here. What you are getting is a personal attorney review of your case, a dedicated immigration consultant assigned specifically to you, and a real professional evaluation of your pathway to the United States. After payment, you will receive a confirmation email, your receipt, your case number, and direct access to our client services team — people you can contact anytime. " + firstName||"the client" + ", your profile is strong. The opportunity is real. This is just the first step — and it is a small one. OK? And to activate your case with our immigration attorney — what do you prefer to use, Visa or Mastercard?",

    think: namePrefix + "Of course — take all the time you need. But I want to share something with you: the spots we have available are genuinely limited, and we do work by country allocation. I would hate for you to come back in a few days and find that the availability for " + (answers['q2']||'your country') + " has changed. You have already done the hard part today — the assessment is done, your pathway is identified. The $250 simply opens your file and gets the process moving. I am genuinely happy for you and I want to see this happen. OK? And to activate your case with our immigration attorney — what do you prefer to use, Visa or Mastercard?",

    spouse: namePrefix + "I completely understand — and I respect that. But let me be transparent: what we are doing today is simply opening a file. No major decision is being made right now. Everything will be fully visible to " + spouseRef + " — the confirmation email, the receipt, the case number, the consultant details. They will see everything. Actually — would it be possible to bring " + spouseRef + " on the call right now? Even for just a minute. I would love to answer any questions together. If not, that is fine — but Your success is our success. OK? And to activate your case with our immigration attorney — what do you prefer to use, Visa or Mastercard?",

    pay_later: namePrefix + "I wish I could offer that flexibility. The $250 activates your file — it is what assigns you a case number, starts the attorney review, and connects you to your personal consultant. Without it, your profile just sits here without moving forward. Think of it this way: this is less than what most people spend on a single hour with an immigration attorney — and it covers everything: the review, the consultant, and ongoing client support. I really want to make this work for you. OK? And to activate your case with our immigration attorney — what do you prefer to use, Visa or Mastercard?",

    no_qualify: namePrefix + "That is actually a really important question — and it shows you are thinking carefully. Here is the honest answer: the $250 covers the attorney review, which is specifically designed to tell you exactly where you stand legally. If for any reason the attorney determines that your profile needs more preparation before moving forward, they will tell you that — clearly, professionally, and with a path forward. You are not paying for a guarantee — you are paying for real clarity from a professional. OK? And to activate your case with our immigration attorney — what do you prefer to use, Visa or Mastercard?",

    legit: namePrefix + "That is a fair and smart question. We are a registered immigration services company that has helped clients from " + (answers['q2']||'around the world') + " and over 80 countries navigate this process. After you open your file, you will immediately receive a confirmation email with your receipt, your unique case number, and the contact details for your personal consultant. You will have a real person you can reach at any time. I will personally keep an eye on your file every step of the way. OK? And to activate your case with our immigration attorney — what do you prefer to use, Visa or Mastercard?",

    free: namePrefix + "You are right — there are free tools online. But here is the real difference: a free tool gives you general information. What we provide is a licensed immigration attorney personally reviewing your specific profile, your background, your country, your goals. No automated tool can do that. The $250 is not for information — it is for a professional legal evaluation of you specifically. And after that review, you will have a dedicated consultant working your case. That is a completely different level of service. OK? And to activate your case with our immigration attorney — what do you prefer to use, Visa or Mastercard?",

    scammed: namePrefix + "I hear you — and I am genuinely sorry that happened. There are bad actors in this industry and it makes everything harder. What I can tell you is this: we do not ask for large amounts upfront, we do not make promises we cannot keep, and we do not disappear after payment. After the $250, you immediately receive a confirmation email, a receipt, your case number, and the direct contact details of your consultant. You have a real paper trail from the first moment. I want to see you succeed — your success is our success. OK? And to activate your case with our immigration attorney — what do you prefer to use, Visa or Mastercard?",

    not_lawyer: namePrefix + "You are right — I am not an attorney, and I want to be fully transparent about that. My role is to conduct this initial assessment and make sure your profile reaches the right hands. Once your file is opened, a licensed immigration attorney personally reviews your case. That is who evaluates your eligibility — not me, not a system. I am here to make sure the process starts correctly for you. OK? And to activate your case with our immigration attorney — what do you prefer to use, Visa or Mastercard?",

    writing: namePrefix + "Absolutely — and you will have everything in writing. The moment your file is opened, you receive a full confirmation email: your receipt, your case number, the pathways identified, and the next steps. Everything is documented and sent directly to you. But I want to be honest — sometimes when someone says send me something first, there is a concern underneath that I have not addressed yet. I genuinely want this to work out for you. OK? And to activate your case with our immigration attorney — what do you prefer to use, Visa or Mastercard?",

    email: namePrefix + "I understand — and I want to be honest with you about something. When a client says send me an email, it usually means something did not feel right in the conversation, and I would rather address that directly than send you a message you may never open. What I can tell you is this: the email you will receive after opening your file is real and complete — your receipt, your case number, the list of required documents, and the direct contact of your personal immigration consultant. Someone you can reach anytime, even after the attorney review. But that email only exists after your file is opened. I am genuinely happy for you and I want to see you get there. OK? And to activate your case with our immigration attorney — what do you prefer to use, Visa or Mastercard?",

    not_ready: namePrefix + "I hear you — and I respect that completely. Can I ask: what would need to change for you to feel ready? Because sometimes not ready means there is a specific concern we can actually address right now. The reason I ask is that immigration availability is genuinely limited — by pathway, and even by country. Your profile is strong. The opportunity is here today. I would hate for the timing to work against you. OK? And to activate your case with our immigration attorney — what do you prefer to use, Visa or Mastercard?",

    few_months: namePrefix + "I completely respect that. But I want to share something with you honestly: we work with limited spots per country, and immigration categories can shift. What is available for " + (answers['q2']||'your country') + " today may look different in a few months. Your assessment is done. Your pathway is identified. The only thing left is to open your file — and that takes two minutes. I will personally keep an eye on your file. OK? And to activate your case with our immigration attorney — what do you prefer to use, Visa or Mastercard?",

    sort_things: namePrefix + "Of course — life is busy and complicated, I understand that. What I can tell you is that opening your file does not lock you into a timeline. It simply means an attorney reviews your case and a consultant is assigned to you. You move forward at your own pace. Think of it as securing your place while you handle everything else. The spot is reserved for you. OK? And to activate your case with our immigration attorney — what do you prefer to use, Visa or Mastercard?",

    real_chance: namePrefix + "Based on everything you shared today — your background, your goals, your profile — yes, there is a real pathway here. I would not be having this conversation with you if there was not. Now, I cannot make legal guarantees — only the attorney review can give you that certainty. But the assessment we did today is based on real immigration criteria, and your profile matched. That is not something that happens for everyone. I am genuinely happy for you — I want to see you succeed. OK? And to activate your case with our immigration attorney — what do you prefer to use, Visa or Mastercard?",

    english: namePrefix + "Your English does not need to be perfect — and honestly, that is not what immigration is based on. The process is handled through documents, forms, and your personal consultant who will guide you through every single step. Many of our most successful clients had limited English when they started. Your success is our success. OK? And to activate your case with our immigration attorney — what do you prefer to use, Visa or Mastercard?",

    too_old: namePrefix + "Age is almost never a disqualifying factor in U.S. immigration — and for the pathway we identified, your experience and everything you have built in your life are actually more valuable than youth. Many of our clients started this process in their 50s and 60s and succeeded. What matters is who you are and what you have achieved — and you have a strong profile. OK? And to activate your case with our immigration attorney — what do you prefer to use, Visa or Mastercard?",

    criminal: namePrefix + "Thank you for being honest with me — that takes courage, and it actually helps us. Not all criminal records affect immigration eligibility. It depends entirely on the type, the severity, and how long ago it occurred. This is exactly what the attorney review is designed to evaluate — your specific situation, with full context. The $250 gets your case in front of a professional who can give you a real, honest answer about where you stand." + "\n\nI am genuinely happy for you — I want to see you succeed, and your success is our success. I will personally keep an eye on your file. So — would you like to use Visa or Mastercard?",

    visa_denied: namePrefix + "A previous denial does not close the door — it is actually more common than you might think. What matters is why it happened and which pathway we are pursuing now. The categories we identified today are completely different from a tourist or temporary visa. The attorney review will look at your full history and advise on the strongest approach. I will personally keep an eye on your case. OK? And to activate your case with our immigration attorney — what do you prefer to use, Visa or Mastercard?",

    how_long: namePrefix + "The timeline depends on your specific pathway and personal situation — and that is something the attorney will map out for you in detail. Generally, immigration processes take anywhere from several months to a few years. But here is the most important thing: the process starts from the day your file opens. Every day you wait is a day added to the end. The sooner we start, the sooner you get there. OK? And to activate your case with our immigration attorney — what do you prefer to use, Visa or Mastercard?",

    leave_country: namePrefix + "For most of the pathways we identified — including " + topPathway + " — you do not need to leave " + (answers['q2']||'your country') + " to start the process. The initial steps are handled through documentation and your consultant. Whether travel is eventually required depends on the specific visa category, and the attorney will explain that clearly. I am genuinely happy for you — your success is our success. OK? And to activate your case with our immigration attorney — what do you prefer to use, Visa or Mastercard?",

    chances: namePrefix + "I am not going to give you empty guarantees — that would not be honest, and you deserve honesty. What I can tell you is that the assessment we did today is based on real immigration criteria, and your profile matched a real pathway. The attorney review will give you the most accurate picture of your actual chances — with full context, full legal knowledge, and I will personally keep an eye on your file to see how it progresses. OK? And to activate your case with our immigration attorney — what do you prefer to use, Visa or Mastercard?"
  };

    return (objResponses && objResponses[key]) ? objResponses[key] : (objections[key] || '');
}

function renderObj() {
  const cats = [
    { label: '💰 About the price', items: [
      { key:'expensive', q:'$250 is too expensive' },

      { key:'spouse', q:'I want to talk to my spouse / family first' },

      { key:'criminal', q:'I have a criminal record' },
      { key:'visa_denied', q:'I have been denied a visa before' },
    ]},
    { label: '❓ About the process', items: [
      { key:'how_long', q:'How long does the process take?' },
      { key:'leave_country', q:'Do I need to leave my country?' },
      { key:'chances', q:'What are my chances of success?' },
    ]},
  ];

  var html = '';
  cats.forEach(function(cat) {

      html += '<div class="obj-item">';

      html += '<div class="obj-ans">';

      html += '<div class="obj-listen-text">"What do you mean?"<br><br>(LISTEN — let the client explain everything. Do not interrupt.)</div></div>';

      html += '<textarea class="obj-notes" placeholder="Note if needed..." data-key="' + item.key + '" id="note-' + item.key + '" onchange="answers[' + "'obj_note_'" + '+this.dataset.key]=this.value;showAiBtn(' + "'" + item.key + "'" + ')"></textarea>';
      html += '<button class="obj-ai-btn" id="ai-btn-' + item.key + '" onclick="getAIResponse(' + "'" + item.key + "','" + item.q.replace(/'/g,"&#39;") + "'" + ')">✨ Get personalized response</button>';
      html += '<div class="obj-ai-result" id="ai-result-' + item.key + '"></div>';
      html += '<div class="obj-ans-label">📞 Step 2 — Read to client</div>';
      html += '<div class="obj-ans-text">' + ans + '</div>';
      html += '</div></div>';
    });
  });

  document.getElementById('obj-content').innerHTML = html;
}
</script>

    installment: `${name}, thank you for being open with me — that is exactly the kind of honesty that helps me help you. I want you to know: you are in good hands here. We have helped thousands of people from ${country} and around the world navigate this process. The $250 is a single payment — not a subscription, not a commitment to more. It simply opens your file and gets a real attorney looking at your case. I will personally keep an eye on your file every step of the way. OK? And to activate your case with our immigration attorney — what do you prefer to use, Visa or Mastercard?`,

    expensive: `${name}, I appreciate you saying that — it tells me you are thinking carefully, and that is a good sign. Here is what I want you to know: we are not here to take your money. We are here because your profile — as a ${profession} from ${country} — shows genuine potential for ${pathway}. The $250 is the smallest possible first step toward something that could change your life. And after payment, you have a receipt, a case number, and a real person assigned to you. I want to see you succeed. OK? Visa or Mastercard?`,

    money: `${name}, I hear you — and I respect that completely. What I want you to know first is that you are dealing with a real, registered company that has helped real people. The $250 is not a fee we take and disappear. It activates your file, assigns you a personal consultant, and gets a licensed attorney reviewing your case. Everything is documented. I will be following your progress personally. OK? Visa or Mastercard?`,

    afford: `${name}, thank you for trusting me with that. I want you to feel completely safe here — no pressure, no tricks. What I can tell you is that $250 is the only amount we ask for at this stage, and in return you get a real attorney review and a consultant who will stay with you. We believe in your case. I genuinely want this to work out for you. OK? Visa or Mastercard?`,

    busy: `${name}, I completely understand — and the reason I am telling you this now is because I genuinely care about your case. Opening your file today takes two minutes. Everything after that moves at your pace. Your consultant will work around your schedule. I will personally make sure your file gets the attention it deserves. OK? Visa or Mastercard?`,

    later: `${name}, I respect that — and I want to be completely honest with you, not just sell you something. The reason timing matters here is real: we work with limited spots by country, and ${country} is in demand. Your assessment is done. Your pathway is identified. The only thing that could hold you back is waiting. I want to see you get there. OK? Visa or Mastercard?`,

    time: `${name}, I understand — and I promise, this is literally two minutes of your time today. After that, your consultant handles everything. We have guided people from ${country} through this entire process, and our job is to make it as easy as possible for you. I will personally keep an eye on your case. OK? Visa or Mastercard?`,

    scam: `${name}, I am really glad you said that — because it means you are protecting yourself, and that is smart. Let me tell you what happens the moment you pay: you receive a confirmation email with your receipt, your unique case number, and the direct contact details of your personal consultant. You have a paper trail from second one. We do not disappear. I will personally be watching your file. OK? Visa or Mastercard?`,

    trust: `${name}, I appreciate that you are being honest with me — and I want to earn your trust, not just ask for it. We are a registered immigration services company. After the $250, you immediately receive documentation, a case number, and a real human being assigned to your case. Your success is genuinely our success — because our reputation depends on it. OK? Visa or Mastercard?`,

    proof: `${name}, absolutely — and everything will be in writing. The moment you pay, you receive a confirmation email with your receipt, your case number, the pathways identified, and your consultant contact. There are no surprises. I will personally make sure your file is handled with care. OK? Visa or Mastercard?`,

    wife: `${name}, that shows you are a responsible person — and I respect that. I want you to know: everything we are doing is fully transparent. Your wife will receive the same confirmation email, the same receipt, the same case number. Would it be possible to bring her on the call for just a moment? I would love to answer any questions together. If not — I will make sure she has everything she needs in writing. OK? Visa or Mastercard?`,

    husband: `${name}, that is completely understandable — and your husband will see everything: the confirmation email, the receipt, all the details. Would it be possible to bring him on for just a minute? I want him to feel as confident as I do about your case. OK? Visa or Mastercard?`,

    spouse: `${name}, I completely understand — and I want your spouse to feel just as comfortable as you do. Everything will be fully visible to them — the confirmation, the receipt, the consultant details. Would it be possible to bring them on the call right now, even briefly? OK? Visa or Mastercard?`,

    family: `${name}, family is everything — and I respect that you want them involved. What I want you to know is that this decision does not lock anyone into anything dramatic. It opens a file. Everything is documented and visible. Would it be possible to bring a family member on for just a moment so I can answer any questions directly? OK? Visa or Mastercard?`,

    chance: `${name}, I would not be sitting here having this conversation with you if I did not genuinely believe in your case. Your profile as a ${profession} from ${country} matched real immigration criteria. That is not something that happens for everyone. The attorney review will give you the professional confirmation you deserve. I am genuinely happy for you. OK? Visa or Mastercard?`,

    qualify: `${name}, the assessment we just did is based on real U.S. immigration criteria — not guesswork. Your profile matched. That is the honest truth. What the $250 does is get a licensed attorney to confirm that professionally and build your strategy. I want to see you get that answer. OK? Visa or Mastercard?`,

    sure: `${name}, your uncertainty is completely natural — and it is actually why the attorney review exists. You are not paying for a guarantee. You are paying for real clarity from a professional who has seen hundreds of cases like yours. I am on your side here. Let us get you that answer. OK? Visa or Mastercard?`,

    denied: `${name}, a previous denial does not define your future — and I mean that. What matters is the pathway we are pursuing now, which is completely different from what was denied before. The attorney will look at your full history and build the strongest possible case. Many of our most successful clients started exactly where you are. I believe in your case. OK? Visa or Mastercard?`,

    rejected: `${name}, a previous rejection gives us valuable information to work with — not a reason to stop. The attorney review will look at exactly what happened and advise on the best approach going forward. I have seen people in your situation succeed. I want that for you too. OK? Visa or Mastercard?`,

    default: `${name}, I hear you — and whatever is on your mind, I want you to know that you are in good hands. We are a real company, with real attorneys, and real consultants who will be assigned personally to your case. Your profile as a ${profession} from ${country} shows genuine potential for ${pathway}. I am genuinely happy for you, and your success is our success. I will personally keep an eye on your file. OK? And to activate your case with our immigration attorney — what do you prefer to use, Visa or Mastercard?`
  };;

  // Match note to best template
  const keywordMap = {
    installment: ['installment','install','payment plan','split','partial'],
    expensive: ['expensive','too much','lot of money','high price','costly'],
    money: ['money','cash','funds','afford','budget','financial'],
    afford: ['cannot afford','cant afford','no money','broke'],
    busy: ['busy','no time','not available','schedule','work a lot'],
    later: ['later','next month','next week','few months','not now','wait'],
    time: ['time','minutes','hours','how long','quick'],
    scam: ['scam','fraud','fake','not real','suspicious','not legit'],
    trust: ['trust','believe','sure','legitimate','real','genuine'],
    proof: ['proof','evidence','guarantee','document','written','email first'],
    wife: ['wife','girlfriend','partner'],
    husband: ['husband','boyfriend'],
    spouse: ['spouse','partner','significant other'],
    family: ['family','parents','children','kids','relatives'],
    chance: ['chance','odds','probability','likely','possible'],
    qualify: ['qualify','eligible','meet requirements','fit'],
    sure: ['not sure','unsure','doubt','maybe','think'],
    denied: ['denied','denial','rejected visa','visa denied','refused'],
    rejected: ['rejected','rejection','turned down','refused']
  };

  for(const [templateKey, keywords] of Object.entries(keywordMap)) {
    if(keywords.some(kw => noteLower.includes(kw))) {
      response = templates[templateKey];
      break;
    }
  }

  if(!response) response = templates.default;

  // Show result
  setTimeout(() => {
    result.innerHTML = '<div class="obj-ai-label">✨ Personalized Response — Read to client</div>' + response;
    result.classList.add('show');
    btn.textContent = '✨ Regenerate';
    btn.disabled = false;
  }, 600);
}


function showAiBtn(key) {
  const btn = document.getElementById('ai-btn-'+key);
  const note = document.getElementById('note-'+key);
  if(btn && note) {
    if(note.value.trim().length > 0) btn.classList.add('visible');
    else btn.classList.remove('visible');
  }
}
</script>
