<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>U.S. Immigration Assessment — Full Questionnaire</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f0f4f8; min-height: 100vh; padding: 20px 16px 60px; color: #1a1a2e; }
.container { max-width: 660px; margin: 0 auto; }
.header { text-align: center; padding: 28px 0 22px; }
.header-flag { font-size: 30px; margin-bottom: 8px; }
.header-title { font-size: 21px; font-weight: 700; color: #1a1a2e; margin-bottom: 4px; }
.header-sub { font-size: 12px; color: #6b7280; }
.progress-wrap { margin-bottom: 24px; }
.progress-meta { display: flex; justify-content: space-between; font-size: 12px; color: #6b7280; margin-bottom: 6px; }
.progress-bar { height: 5px; background: #e2e8f0; border-radius: 3px; }
.progress-fill { height: 5px; background: linear-gradient(90deg, #2563eb, #3b82f6); border-radius: 3px; transition: width 0.4s; }
.card { background: #fff; border-radius: 14px; padding: 24px 22px; box-shadow: 0 1px 6px rgba(0,0,0,0.07); margin-bottom: 12px; }
.section-eyebrow { font-size: 10px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; color: #2563eb; margin-bottom: 16px; display: flex; align-items: center; gap: 6px; }
.section-eyebrow::after { content: ''; flex: 1; height: 1px; background: #e5e7eb; }
.phase-badge { display: inline-block; font-size: 10px; font-weight: 700; letter-spacing: 0.06em; text-transform: uppercase; padding: 3px 10px; border-radius: 20px; margin-bottom: 14px; }
.phase-1 { background: #eff6ff; color: #1d4ed8; }
.phase-2 { background: #f0fdf4; color: #15803d; }
.q-num { font-size: 11px; font-weight: 600; color: #9ca3af; margin-bottom: 4px; }
.q-title { font-size: 16px; font-weight: 700; color: #111827; margin-bottom: 6px; line-height: 1.4; }
.q-hint { font-size: 12px; color: #6b7280; margin-bottom: 14px; line-height: 1.5; font-style: italic; }
.q-example { font-size: 11px; color: #9ca3af; background: #f9fafb; border-left: 3px solid #e5e7eb; padding: 8px 12px; border-radius: 0 6px 6px 0; margin-bottom: 12px; line-height: 1.5; }
.inp { width: 100%; padding: 10px 13px; border: 1.5px solid #d1d5db; border-radius: 9px; font-size: 13px; color: #111827; background: #fff; transition: border-color 0.15s; margin-bottom: 10px; font-family: inherit; }
.inp:focus { outline: none; border-color: #2563eb; }
textarea.inp { min-height: 100px; resize: vertical; line-height: 1.6; }
.inp-label { font-size: 11px; font-weight: 600; color: #374151; margin-bottom: 4px; display: block; }
.opts { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 12px; }
.opts.col1 { grid-template-columns: 1fr; }
.opt { padding: 10px 13px; border: 1.5px solid #e5e7eb; border-radius: 9px; background: #fff; color: #374151; font-size: 13px; cursor: pointer; text-align: left; transition: all 0.15s; line-height: 1.4; width: 100%; }
.opt:hover { border-color: #93c5fd; background: #eff6ff; }
.opt.sel { border-color: #2563eb; background: #eff6ff; color: #1d4ed8; font-weight: 600; }
.check-opts { display: flex; flex-direction: column; gap: 7px; margin-bottom: 12px; }
.check-opt { display: flex; align-items: flex-start; gap: 10px; padding: 10px 13px; border: 1.5px solid #e5e7eb; border-radius: 9px; background: #fff; cursor: pointer; transition: all 0.15s; }
.check-opt:hover { border-color: #93c5fd; background: #f8faff; }
.check-opt.sel { border-color: #2563eb; background: #eff6ff; }
.check-box { width: 18px; height: 18px; border: 2px solid #d1d5db; border-radius: 4px; flex-shrink: 0; margin-top: 1px; display: flex; align-items: center; justify-content: center; font-size: 11px; transition: all 0.15s; }
.check-opt.sel .check-box { background: #2563eb; border-color: #2563eb; color: #fff; }
.check-text { font-size: 13px; color: #374151; line-height: 1.4; }
.check-opt.sel .check-text { color: #1d4ed8; font-weight: 500; }
.nav { display: flex; align-items: center; justify-content: space-between; margin-top: 18px; gap: 10px; }
.btn-back { background: none; border: 1.5px solid #d1d5db; border-radius: 9px; padding: 10px 18px; font-size: 13px; color: #6b7280; cursor: pointer; }
.btn-back:hover { border-color: #9ca3af; }
.btn-next { background: #2563eb; border: none; border-radius: 9px; padding: 10px 24px; font-size: 13px; color: #fff; cursor: pointer; font-weight: 600; flex: 1; }
.btn-next:hover { background: #1d4ed8; }
.btn-next:disabled { opacity: 0.4; cursor: not-allowed; }
.search-wrap { position: relative; margin-bottom: 10px; }
.search-icon { position: absolute; left: 11px; top: 50%; transform: translateY(-50%); color: #9ca3af; pointer-events: none; }
.search-inp { width: 100%; padding: 10px 13px 10px 32px; border: 1.5px solid #d1d5db; border-radius: 9px; font-size: 13px; color: #374151; }
.search-inp:focus { outline: none; border-color: #2563eb; }
.country-list { border: 1.5px solid #e5e7eb; border-radius: 9px; max-height: 200px; overflow-y: auto; background: #fff; margin-bottom: 12px; }
.ci { padding: 9px 13px; font-size: 13px; color: #374151; cursor: pointer; border-bottom: 1px solid #f3f4f6; }
.ci:last-child { border-bottom: none; }
.ci:hover { background: #f9fafb; }
.ci.csel { background: #eff6ff; color: #1d4ed8; font-weight: 500; }
.pill { display: inline-flex; align-items: center; gap: 5px; background: #eff6ff; color: #1d4ed8; border-radius: 20px; padding: 4px 11px; font-size: 12px; margin-bottom: 8px; }
.pill-x { cursor: pointer; font-size: 14px; line-height: 1; }
.profession-list { border: 1.5px solid #e5e7eb; border-radius: 9px; max-height: 180px; overflow-y: auto; background: #fff; margin-bottom: 8px; }
.pi { padding: 8px 13px; font-size: 13px; color: #374151; cursor: pointer; border-bottom: 1px solid #f3f4f6; }
.pi:hover { background: #f9fafb; }
.pi.pis { background: #eff6ff; color: #1d4ed8; font-weight: 500; }
.optional-badge { display: inline-block; font-size: 10px; padding: 2px 7px; border-radius: 10px; background: #f3f4f6; color: #9ca3af; border: 1px solid #e5e7eb; margin-left: 6px; vertical-align: middle; }
.welcome-bar { background: #eff6ff; border: 1px solid #bfdbfe; border-radius: 10px; padding: 10px 14px; margin-bottom: 16px; display: flex; align-items: center; gap: 10px; }
.welcome-avatar { width: 32px; height: 32px; background: #2563eb; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 700; color: #fff; flex-shrink: 0; }
.welcome-name { font-size: 13px; font-weight: 600; color: #1d4ed8; }
.welcome-sub { font-size: 11px; color: #3b82f6; }
.autofill-note { font-size: 11px; color: #16a34a; background: #f0fdf4; border: 1px solid #bbf7d0; border-radius: 7px; padding: 6px 10px; margin-bottom: 10px; }
.saving-overlay { display: none; position: fixed; inset: 0; background: rgba(255,255,255,0.88); z-index: 999; align-items: center; justify-content: center; flex-direction: column; gap: 12px; }
.saving-overlay.show { display: flex; }
.saving-spinner { width: 34px; height: 34px; border: 3px solid #e5e7eb; border-top-color: #2563eb; border-radius: 50%; animation: spin 0.8s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }
.saving-text { font-size: 13px; color: #6b7280; font-weight: 500; }
.thankyou { text-align: center; padding: 16px 0; }
.thankyou-icon { font-size: 48px; margin-bottom: 14px; }
.thankyou-title { font-size: 21px; font-weight: 700; color: #111827; margin-bottom: 8px; }
.thankyou-sub { font-size: 13px; color: #6b7280; line-height: 1.7; margin-bottom: 20px; }
.thankyou-box { background: #f0f9ff; border: 1px solid #bae6fd; border-radius: 12px; padding: 16px 18px; font-size: 13px; color: #0369a1; line-height: 1.6; text-align: left; }
.email-step { text-align: center; padding: 8px 0; }
.email-icon { font-size: 40px; margin-bottom: 14px; }
.email-title { font-size: 19px; font-weight: 700; margin-bottom: 6px; }
.email-sub { font-size: 13px; color: #6b7280; margin-bottom: 20px; line-height: 1.6; }
.email-status { font-size: 12px; margin-top: 8px; min-height: 18px; line-height: 1.5; }
.email-status.ok { color: #16a34a; }
.email-status.err { color: #dc2626; }
.email-status.loading { color: #6b7280; }
@media (max-width: 480px) { .card { padding: 18px 14px; } .opts { grid-template-columns: 1fr; } }
</style>
</head>

async function loadAll() {
  try {
    // Step 1: if contact_id in URL → load contact directly
    if(contactId) {
      await loadContactFields(contactId);
      currentStep = contactEmail ? 'email' : 'email';
      render(); return;
    }
    // Step 2: if lead_id → get lead → find contact by email
    if(leadId) {
      const res = await fetch(`${WEBHOOK}crm.lead.get?ID=${leadId}`);
      const data = await res.json();
      if(data.result) {
        const ld = data.result;
        contactName = [ld.NAME, ld.LAST_NAME].filter(Boolean).join(' ') || '';
        firstName = contactName.split(' ')[0] || '';
        contactEmail = ld.EMAIL?.[0]?.VALUE || '';
        if(contactEmail) answers['email'] = contactEmail;
        // Pre-fill from lead fields
        prefillFromLead(ld);
        // Parse COMMENTS for all answers
        if(ld.COMMENTS) parseComments(ld.COMMENTS);
        // Try to find linked contact
        if(contactEmail) {
          try {
            const cr = await fetch(`${WEBHOOK}crm.contact.list?filter[EMAIL]=${encodeURIComponent(contactEmail)}&select[]=ID`);
            const cd = await cr.json();
            if(cd.result && cd.result.length > 0) {
              contactId = cd.result[0].ID;
              await loadContactFields(contactId);
            }
          } catch(e){}
        }
      }
    }
  } catch(e){}
  currentStep = 'email';
  render();
}

// Load all fields from Contact and pre-fill answers

  try {
    const res = await fetch(`${WEBHOOK}crm.contact.get?ID=${cid}`);
    const data = await res.json();
    if(!data.result) return;
    const c = data.result;

    // Basic info
    if(!contactName) contactName = [c.NAME, c.LAST_NAME].filter(Boolean).join(' ') || '';
    if(!firstName) firstName = contactName.split(' ')[0] || '';
    if(!contactEmail) contactEmail = c.EMAIL?.[0]?.VALUE || '';
    if(contactEmail) answers['email'] = contactEmail;

    // ── Map Contact fields → answers ──

    // Country of birth / residence
    if(c.UF_CRM_566016C18B2CC) answers['s1_birth'] = c.UF_CRM_566016C18B2CC;
    if(c.UF_CRM_1449131599) answers['s1_country'] = c.UF_CRM_1449131599; // from lead field if exists

    // Marital status (string field)
    if(c.UF_CRM_64CBB649310F0) {
      const ms = c.UF_CRM_64CBB649310F0;

      const matched = validStatuses.find(s => ms.toLowerCase().includes(s.toLowerCase()));
      if(matched) answers['s1_marital'] = matched;
    }
    if(c.UF_CRM_1500181716 && !answers['s1_marital']) answers['s1_marital'] = c.UF_CRM_1500181716;

    // Education
    if(c.UF_CRM_1465285867) {
      // It's a list ID — reverse map
      const eduRev = {'250':'Primary school only','251':'High School, no degree','252':'High School degree','253':'Vocational School','254':'Some university Courses','12567':'University Degree','256':'Some Graduate Level Courses','12568':"Master's Degree",'267':'Some Doctorate Level Courses','268':'Doctorate Degree'};
      const mapped = eduRev[String(c.UF_CRM_1465285867)];
      if(mapped) { answers['s2_edu_level'] = mapped; }
    }
    if(c.UF_CRM_1656684580) answers['s2_edu_level'] = answers['s2_edu_level'] || c.UF_CRM_1656684580;
    if(c.UF_CRM_64CF881B8596B) answers['s2_edu_level'] = answers['s2_edu_level'] || c.UF_CRM_64CF881B8596B;

    // Profession
    if(c.UF_CRM_1484918121) answers['s1_profession'] = c.UF_CRM_1484918121;

    // Income
    if(c.UF_CRM_1484917802) answers['income_prefilled'] = c.UF_CRM_1484917802;

    // Spouse
    if(c.UF_CRM_5663EF2587EEC) answers['spouse_fname'] = c.UF_CRM_5663EF2587EEC;
    if(c.UF_CRM_146529634) answers['spouse_lname'] = c.UF_CRM_146529634;
    if(c.UF_CRM_1596458290) answers['spouse_birth_country'] = c.UF_CRM_1596458290;
    if(c.UF_CRM_1465286312) {
      const eduRev = {'250':'Primary school only','251':'High School, no degree','252':'High School degree','253':'Vocational School','254':'Some university Courses','12567':'University Degree','256':'Some Graduate Level Courses','12568':"Master's Degree",'267':'Some Doctorate Level Courses','268':'Doctorate Degree'};
      const mapped = eduRev[String(c.UF_CRM_1465286312)];
      if(mapped) answers['spouse_edu'] = mapped;
    }

    // Number of children
    if(c.UF_CRM_5663EF24DD8A5) {
      answers['children_count'] = c.UF_CRM_5663EF24DD8A5;
      if(parseInt(c.UF_CRM_5663EF24DD8A5) > 0) answers['has_children'] = 'Yes';
    }

    // Top reason / why US
    if(c.UF_CRM_1648031237) answers['s2_why_us'] = c.UF_CRM_1648031237;

    // Date of birth → derive age bracket
    if(c.UF_CRM_64CBB646272AB && !answers['s1_age']) {
      try {
        const dob = new Date(c.UF_CRM_64CBB646272AB);
        const age = Math.floor((Date.now() - dob) / (365.25*24*3600*1000));
        answers['exact_age'] = String(age);
        if(age < 25) answers['s1_age'] = '18–24';
        else if(age < 35) answers['s1_age'] = '25–34';
        else if(age < 45) answers['s1_age'] = '35–44';

        else answers['s1_age'] = '65+';
      } catch(e){}
    }

function prefillFromLead(ld) {
  if(ld.UF_CRM_1449131599) answers['s1_country'] = ld.UF_CRM_1449131599;
  if(ld.UF_CRM_1709560603) answers['s1_profession'] = ld.UF_CRM_1709560603;
  if(ld.UF_CRM_1484914608) {
    const eduMapLead = {'13320':'High School','13321':'Trade School','13322':'Associate Degree','13323':"Bachelor's Degree",'13324':"Master's Degree",'13325':'Doctorate (PhD)'};
    if(eduMapLead[String(ld.UF_CRM_1484914608)]) answers['s1_edu'] = eduMapLead[String(ld.UF_CRM_1484914608)];
  }
  if(ld.UF_CRM_1500181612) {
    const msMap = {
      '4070':'Single','4071':'Married','4072':'Divorced','4073':'Widowed',
      '4074':'Divorced','12542':'Married','12552':'Single','12562':'Married'
    };
    if(msMap[String(ld.UF_CRM_1500181612)]) answers['s1_marital'] = msMap[String(ld.UF_CRM_1500181612)];
  }

  // ── Parse COMMENTS field for all answers ──
  const comments = ld.COMMENTS || '';
  if(comments) parseComments(comments);
}

function parseComments(text) {
  function extract(label) {
    const re = new RegExp(label + '[:\\s]+([^\\n]+)', 'i');
    const m = text.match(re);
    return m ? m[1].trim() : null;
  }

  // Age
  const age = extract('Age');
  if(age) {
    answers['s1_age'] = age;
  }
  const exactAge = extract('Exact Age');
  if(exactAge) answers['exact_age'] = exactAge;

  // Country
  const country = extract('Country of Residence');
  if(country) answers['s1_country'] = country;

  const birthCountry = extract('Country of Birth');
  if(birthCountry) answers['s1_birth'] = birthCountry;

  // Marital Status
  const marital = extract('Marital Status');
  if(marital) {
    const validStatuses = ['Single','Married','Divorced','Widowed'];
    const matched = validStatuses.find(s => marital.toLowerCase().includes(s.toLowerCase()));
    if(matched) answers['s1_marital'] = matched;
  }

  // Spouse
  const spouseLine = extract('Spouse');
  if(spouseLine) {
    // Format: "Name | Country: X | Edu: X | Exp: X | Immigrating: X"
    const namePart = spouseLine.split('|')[0].trim();
    if(namePart) {
      const parts = namePart.trim().split(' ');
      answers['spouse_fname'] = parts[0] || '';
      answers['spouse_lname'] = parts.slice(1).join(' ') || '';
    }
    const spouseCountry = spouseLine.match(/Country:\s*([^|]+)/i);
    if(spouseCountry) answers['spouse_birth_country'] = spouseCountry[1].trim();
    const spouseEdu = spouseLine.match(/Edu:\s*([^|]+)/i);
    if(spouseEdu) {
      const rawEdu = spouseEdu[1].trim();
      // Map from Stage 1 education values to Stage 2 values
      const eduMap = {
        "High School": "High School degree",
        "Trade School": "Vocational School",
        "Associate Degree": "Some university Courses",
        "Bachelor's Degree": "University Degree",
        "Master's Degree": "Master's Degree",
        "Doctorate (PhD)": "Doctorate Degree"
      };
      answers['spouse_edu'] = eduMap[rawEdu] || rawEdu;
    }
    const spouseImm = spouseLine.match(/Immigrating:\s*([^|]+)/i);
    if(spouseImm) answers['spouse_immigrate'] = spouseImm[1].trim();
  }

  // Children
  const children = extract('Children under 21');
  if(children) {
    if(children.toLowerCase().startsWith('yes')) {
      answers['has_children'] = 'Yes';
      const countMatch = children.match(/\((\d+)\)/);
      if(countMatch) answers['children_count'] = countMatch[1];
    } else if(children.toLowerCase().startsWith('no')) {
      answers['has_children'] = 'No';
    }
  }

  // Goal
  const goal = extract('Primary Goal');
  if(goal) answers['s1_goal'] = goal;

  // Education
  const edu = extract('Education');
  if(edu && !answers['s1_edu']) {
    const eduOpts = ['High School','Trade School','Associate Degree',"Bachelor's Degree","Master's Degree","Doctorate (PhD)"];
    const matched = eduOpts.find(e => edu.toLowerCase().includes(e.toLowerCase()));
    if(matched) answers['s1_edu'] = matched;
  }

  // Profession/Field
  const field = extract('Field');
  if(field && !answers['s1_profession']) answers['s1_profession'] = field;

  // Income
  const income = extract('Monthly Income');
  if(income) {
    // Format: "200000 USD (≈ $200000 USD)" or "$200000 USD"
    const usdMatch = income.match(/[\$]?([0-9,]+)\s*USD/i);
    if(usdMatch) {
      answers['income_usd'] = usdMatch[1].replace(/,/g,'');
      answers['income_amount'] = usdMatch[1].replace(/,/g,'');
      answers['income_currency'] = 'USD';
    }
  }

  // Experience
  const exp = extract('Experience');
  if(exp) answers['s1_experience'] = exp;

  // Leadership
  const leadership = extract('Leadership');
  if(leadership) answers['s1_leadership'] = leadership.includes('Yes') ? 'Yes' : leadership.includes('No') ? 'No' : '';

  // Situation
  const situation = extract('Situation');
  if(situation) answers['s1_situation'] = situation;

  // Business Interest
  const biz = extract('Business Interest');
  if(biz) answers['s1_business'] = biz.includes('Yes') ? 'Yes' : biz.includes('Maybe') ? 'Maybe' : 'No';

  // Investment
  const inv = extract('Investment Level');
  if(inv) answers['s1_investment'] = inv;

  // Study Interest
  const study = extract('Study Interest');
  if(study) answers['s1_study'] = study.includes('Yes') ? 'Yes' : study.includes('Maybe') ? 'Maybe' : 'No';

  // Family in USA
  const familyUSA = extract('Family in USA');
  if(familyUSA) answers['s1_family_usa'] = familyUSA.includes('Yes') ? 'Yes' : 'No';
}

function renderThankYou(main) {
  const prof = answers['s1_profession']||'professional';

  const hasPatents = answers['s2_patents'] && answers['s2_patents'] !== '0';
  const hasPapers = answers['s2_papers'] && answers['s2_papers'] !== '0';

  let strength = '';
  let highlights = [];
  if(highEdu) highlights.push('strong academic background');
  if(highExp) highlights.push('extensive professional experience');
  if(hasRecognition) highlights.push('notable industry recognition');
  if(hasPatents) highlights.push('patent portfolio');
  if(hasPapers) highlights.push('published research');
  if(answers['s2_judging_q']==='Yes') highlights.push('peer review experience');

  if(highlights.length >= 3) strength = 'exceptional';
  else if(highlights.length >= 2) strength = 'very strong';
  else strength = 'solid';

  const highlightText = highlights.length > 0
    ? `Your profile stands out for your ${highlights.slice(0,-1).join(', ')}${highlights.length>1?' and ':''}${highlights[highlights.length-1]}.`
    : `Your background as a ${prof} from ${country} shows genuine potential.`;

  // Build case number from lead_id: IASFF + leadId
  const caseNumber = leadId ? 'IASFF' + leadId : (contactId ? 'IAS' + contactId : 'IAS' + Date.now().toString().slice(-6));
  const name = firstName ? firstName : '';

  main.innerHTML = `<div class="card"><div class="thankyou">
    <div class="thankyou-icon">🎉</div>
    <div class="thankyou-title">Your questionnaire looks ${strength}${name?', '+name:''}!</div>

    <div style="background:linear-gradient(135deg,#eff6ff,#f0fdf4);border:1px solid #bfdbfe;border-radius:12px;padding:16px 18px;margin-bottom:16px;text-align:left">
      <div style="font-size:13px;color:#1e40af;font-weight:600;margin-bottom:6px">✨ Our initial assessment of your profile:</div>
      <div style="font-size:13px;color:#374151;line-height:1.7">${highlightText} Based on what you've shared, you appear to have a <strong>${strength} case</strong> for U.S. immigration. Our attorney will now review the full details.</div>
    </div>

}

// ── CRM ──
async function markVisaStatus() {
  if(!contactId) return;
  try { await fetch(`${WEBHOOK}crm.contact.update?ID=${contactId}&fields[${CRM.VISA_ASSESSMENT}]=${VISA_STATUS.RECEIVED}`); } catch(e){}
}

function saveAndSubmit() {
  const el = document.getElementById('s2_final_inp');
  if(el) answers['s2_final'] = el.value.trim();
  submitAll();
}

const SHEETS_URL = 'https://script.google.com/macros/s/AKfycbxD6bedKExT_oIiSHPFci7UzCPazwoey_S8RKRIWmMMEhlEU09CoF1vhHuYWRl1yEk/exec';

async function submitAll() {
  document.getElementById('saving-overlay').classList.add('show');
  document.getElementById('saving-text').textContent = 'Saving your answers...';
  const summary = buildSummary();
  const fields = buildFields();

  // 1. Save to Bitrix24 CRM
  try {
    if(contactId) {
      const params = Object.entries(fields).map(([k,v])=>`fields[${k}]=${encodeURIComponent(v)}`).join('&');
      await fetch(`${WEBHOOK}crm.contact.update?ID=${contactId}&${params}`);
      await fetch(WEBHOOK+'crm.timeline.comment.add', {method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({fields:{ENTITY_TYPE:'contact',ENTITY_ID:contactId,COMMENT:summary}})});
      await fetch(`${WEBHOOK}crm.contact.update?ID=${contactId}&fields[${CRM.VISA_ASSESSMENT}]=${VISA_STATUS.RECEIVED}`);
    }
  } catch(e){}

  // 2. Save to Google Sheets
  try {
    await fetch(SHEETS_URL, {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({
        leadId: leadId,
        contactId: contactId,
        contactName: contactName,
        contactEmail: contactEmail,
        answers: answers
      })
    });
  } catch(e){}

  document.getElementById('saving-overlay').classList.remove('show');
  goNext('thankyou');
}

function buildFields() {
  const f = {};
  if(answers['s2_edu_level']&&EDU_IDS[answers['s2_edu_level']]) { f[CRM.EDUCATION]=EDU_IDS[answers['s2_edu_level']]; f[CRM.EDUCATION2]=answers['s2_edu_level']; f[CRM.EDUCATION3]=answers['s2_edu_level']; }
  if(answers['s1_marital']) { f[CRM.MARITAL]=answers['s1_marital']; f[CRM.MARITAL2]=answers['s1_marital']; }
  if(answers['s1_profession']) f[CRM.PROFESSION]=answers['s1_profession'];
  if(answers['income_usd']) f[CRM.INCOME]='$'+parseInt(answers['income_usd']).toLocaleString()+' USD/month';
  if(answers['s1_country']) f[CRM.BIRTH_COUNTRY]=answers['s1_country'];
  if(answers['s2_why_us']) f[CRM.TOP_REASON]=answers['s2_why_us'].substring(0,255);
  if(answers['spouse_fname']) f[CRM.SPOUSE_FNAME]=answers['spouse_fname'];
  if(answers['spouse_lname']) f[CRM.SPOUSE_LNAME]=answers['spouse_lname'];
  if(answers['spouse_edu']&&EDU_IDS[answers['spouse_edu']]) f[CRM.SPOUSE_EDU]=EDU_IDS[answers['spouse_edu']];
  if(answers['children_count']) f[CRM.NUM_CHILDREN]=answers['children_count'];
  f[CRM.VISA_ASSESSMENT] = VISA_STATUS.RECEIVED;
  f['COMMENTS'] = buildSummary().substring(0,3000);
  return f;
}

function buildSummary() {
  return [
    '=== U.S. IMMIGRATION ASSESSMENT — FULL QUESTIONNAIRE ===',
    `Client: ${contactName||contactEmail||'unknown'} | Email: ${contactEmail} | Contact ID: ${contactId||'not linked'}`,
    '',
    '━━━ PART 1 — PROFILE ━━━',
    `Age: ${answers['s1_age']||''} ${answers['exact_age']?'(exact: '+answers['exact_age']+')':''}`,
    `Country of residence: ${answers['s1_country']||''}`,
    `Country of birth: ${answers['s1_birth']||''}`,
    `Marital status: ${answers['s1_marital']||''}`,
    answers['s1_marital']==='Married'?`Spouse: ${answers['spouse_fname']||''} ${answers['spouse_lname']||''} | Edu: ${answers['spouse_edu']||''} | Immigrating: ${answers['spouse_immigrate']||''}`:'',
    `Children under 21: ${answers['has_children']||''} ${answers['children_count']?'('+answers['children_count']+')':''}`,
    `Primary goal: ${answers['s1_goal']||''}`,
    `Education (Stage 1): ${answers['s1_edu']||''}`,
    `Profession: ${answers['s1_profession']||''}`,
    `Monthly income: ${answers['income_amount']||''} ${answers['income_currency']||''} (≈ $${answers['income_usd']||''} USD)`,
    `Experience: ${answers['s1_experience']||''}`,
    `Leadership: ${answers['s1_leadership']||''}`,
    `Current situation: ${answers['s1_situation']||''}`,
    `Business interest (Stage 1): ${answers['s1_business']||''}`,
    answers['s1_business']!=='No'?`Investment level: ${answers['s1_investment']||''}`:'',
    `Study interest: ${answers['s1_study']||''}`,
    `Family in U.S.: ${answers['s1_family_usa']||''} ${answers['family_usa_detail']?'— '+answers['family_usa_detail']:''}`,
    '',
    '━━━ PART 2 — DETAILED ASSESSMENT ━━━',
    `Education (detailed level): ${answers['s2_edu_level']||''}`,
    `Academic background: ${answers['s2_edu_detail']||'(not provided)'}`,
    `Academic awards: ${answers['s2_awards_q']==='Yes'?answers['s2_awards']||'(not described)':'None'}`,
    `Employment history: ${answers['s2_career']||'(not provided)'}`,
    `Unique expertise: ${answers['s2_unique_q']||''} ${answers['s2_unique_detail']?'— '+answers['s2_unique_detail']:''}`,
    `Recognition types: ${(answers['s2_recognition']||[]).join(', ')||'none selected'}`,
    `Recognition detail: ${answers['s2_recognition_detail']||'(not provided)'}`,
    `Judging/review roles: ${answers['s2_judging']||'none'}`,
    `Impact projects: ${answers['s2_projects']||'(not provided)'}`,
    `Broader impact: ${answers['s2_impact']||'none'}`,
    `Business plans: ${answers['s2_business_interest']||''} ${answers['s2_business_idea']?'— '+answers['s2_business_idea']:''}`,
    `Asset documentation: ${answers['s2_assets']||''}`,
    `Why the U.S.: ${answers['s2_why_us']||'(not provided)'}`,
    `5-year vision: ${answers['s2_vision']||'(not provided)'}`,
    `Long-term intention: ${answers['s2_intention']||''}`,
    `Preferred city: ${answers['s2_city']||'none'}`,
    `U.S. family: ${answers['s2_us_family']||'none'}`,
    `Additional info: ${answers['s2_extra']||'none'}`,
    `Final thoughts: ${answers['s2_final']||'none'}`,
  ].filter(l=>l!==undefined&&l!=='').join('\n');
}

// ── LOCAL STORAGE — save & restore progress ──
const STORAGE_KEY = 'ias_questionnaire_' + (leadId || contactId || 'guest');

function saveProgress() {
  if(currentStep === 'thankyou') {
    localStorage.removeItem(STORAGE_KEY);
    return;
  }
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify({
      currentStep, answers, contactId, contactName, contactEmail, firstName, stepHistory
    }));
  } catch(e) {}
}

function restoreProgress() {
  try {
    const saved = localStorage.getItem(STORAGE_KEY);
    if(!saved) return false;
    const s = JSON.parse(saved);
    // Only restore if same lead/contact
    if(s.answers) answers = s.answers;
    if(s.contactId) contactId = s.contactId;
    if(s.contactName) { contactName = s.contactName; firstName = s.firstName || contactName.split(' ')[0] || ''; }
    if(s.contactEmail) contactEmail = s.contactEmail;
    if(s.stepHistory) stepHistory = s.stepHistory;
    if(s.currentStep && s.currentStep !== 'email' && s.currentStep !== 'loading' && s.currentStep !== 'thankyou') {
      currentStep = s.currentStep;
      return true;
    }
  } catch(e) {}
  return false;
}

// Patch goNext to auto-save
const _goNext = goNext;
function goNext(next) {
  stepHistory.push(currentStep);
  currentStep = next;
  saveProgress();
  render();
  window.scrollTo({top:0,behavior:'smooth'});
}

// ── INIT ──
const restored = restoreProgress();
if(restored) {
  // Show "continue where you left off" prompt
  const main = document.getElementById('main');
  const name = firstName ? ', ' + firstName : '';
  main.innerHTML = `<div class="card" style="text-align:center;padding:32px 20px">
    <div style="font-size:40px;margin-bottom:14px">👋</div>
    <div style="font-size:18px;font-weight:700;margin-bottom:8px">Welcome back${name}!</div>
    <div style="font-size:13px;color:#6b7280;margin-bottom:24px;line-height:1.6">It looks like you started this questionnaire before.<br>Would you like to continue where you left off?</div>
    <div style="display:flex;flex-direction:column;gap:10px">
      <button class="btn-next" onclick="render()" style="font-size:14px;padding:13px">▶️ Continue where I left off</button>
      <button class="btn-back" onclick="localStorage.removeItem('${STORAGE_KEY}');answers={};stepHistory=[];currentStep='email';render()" style="font-size:13px;padding:11px">🔄 Start over</button>
    </div>
  </div>`;
  document.getElementById('progress-fill').style.width = '0%';
} else {
  render();
}
</script>
