function computePathways() {
  const scores = { executive:0, business:0, employment:0, education:0, family:0 };
  const edu=answers['q5']||'', exp=answers['q7']||'', leadership=answers['q8']||'';
  const recognition=answers['q9']||[], situation=answers['q10']||'';
  const bizInterest=answers['q11']||'', investment=answers['q12']||'';
  const studyInterest=answers['q13']||'', family=answers['q14']||'', goal=answers['q4']||'';
  const highEdu=["Bachelor's Degree","Master's Degree","Doctorate (PhD)"].includes(edu);
  const highExp=['5–10 years','More than 10 years'].includes(exp);
  if(highEdu&&highExp){scores.executive+=3;if(["Master's Degree","Doctorate (PhD)"].includes(edu))scores.executive+=2;if(leadership==='Yes')scores.executive+=2;if(!recognition.includes('None of the Above')&&recognition.length>0)scores.executive+=recognition.length;}
  if(['Business Owner','Entrepreneur','Investor'].includes(situation)&&['Yes','Maybe'].includes(bizInterest)){scores.business+=3;if(!['Under $50,000','Prefer Not To Say'].includes(investment)&&investment)scores.business+=2;if(['Starting or Expanding a Business','Investment Opportunities'].includes(goal))scores.business+=1;}

  if(['Yes','Maybe'].includes(studyInterest))scores.education+=['Business Owner','Investor'].includes(situation)?1:2;
  if(family==='Yes')scores.family+=3;
  const ranked=Object.entries(scores).filter(([,v])=>v>0).sort((a,b)=>b[1]-a[1]).slice(0,3).map(([k])=>PATHWAY_LABELS[k]);
  if(!ranked.length)ranked.push(PATHWAY_LABELS.employment);
  return ranked;
}

  document.getElementById('progress-label').textContent=label||'';
}

function renderC(f){const fl=f.toLowerCase();return COUNTRIES.filter(c=>c.toLowerCase().includes(fl)).map(c=>`<div class="ci ${answers['q2']===c?'csel':''}" onclick="selCountry('${c.replace(/'/g,"\\'")}')">${c}</div>`).join('');}
function filterC(){document.getElementById('clist').innerHTML=renderC(document.getElementById('csearch').value);}
function selCountry(n){answers['q2']=n;render();}
function clearCountry(){delete answers['q2'];render();}
function renderP(f){const fl=f.toLowerCase();return PROFESSIONS.filter(p=>p.toLowerCase().includes(fl)).map(p=>`<div class="pi ${answers['q6_profession']===p?'pis':''}" onclick="selProfession('${p.replace(/'/g,"\\'")}')">${p}</div>`).join('');}
function filterP(){document.getElementById('plist').innerHTML=renderP(document.getElementById('psearch').value);}
function selProfession(n){answers['q6_profession']=n;const m=document.getElementById('prof_manual');if(m)m.value='';document.querySelectorAll('.pi').forEach(p=>p.classList.remove('pis'));document.querySelectorAll('.pi').forEach(p=>{if(p.textContent===n)p.classList.add('pis');});}
function saveProfession(next){const m=document.getElementById('prof_manual')?.value.trim();if(m)answers['q6']=m;else if(answers['q6_profession'])answers['q6']=answers['q6_profession'];if(!answers['q6']){alert('Please select or type a profession.');return;}goNext(next);}
function setChildren(v){answers['has_children']=v;render();}
function saveFamily(next){if(answers['q3']==='Married'){answers['spouse_name']=document.getElementById('spouse_name')?.value||'';answers['spouse_country']=document.getElementById('spouse_country')?.value||'';answers['spouse_edu']=document.getElementById('spouse_edu')?.value||'';answers['spouse_exp']=document.getElementById('spouse_exp')?.value||'';}if(answers['has_children']==='Yes')answers['children_count']=document.getElementById('children_count')?.value||'';goNext(next);}
function selPref(el,n){answers['pref_pathway']=n;document.querySelectorAll('.pref-btn').forEach(b=>b.classList.remove('psel'));el.classList.add('psel');}
function selOpt(id,val,next,el){answers[id]=val;document.querySelectorAll('.opt').forEach(b=>b.classList.remove('sel'));el.classList.add('sel');const btn=document.getElementById('btn-next');if(btn)btn.disabled=false;render();}
function togMulti(id,val){if(!answers[id])answers[id]=[];if(val==='None of the Above'){answers[id]=answers[id].includes(val)?[]:[val];}else{answers[id]=answers[id].filter(v=>v!=='None of the Above');const i=answers[id].indexOf(val);if(i>-1)answers[id].splice(i,1);else answers[id].push(val);}render();}
function saveNotes(nid,next){const el=document.getElementById(nid);if(el)answers[nid]=el.value;goNext(next);}
function goNext(next){history.push(currentId);currentId=next;render();}
function goBack(){if(!history.length)return;currentId=history.pop();render();}

async function submitAll(){
  const goalEl=document.getElementById('client-goal');if(goalEl)answers['client_goal']=goalEl.value;
  const reasonEl=document.getElementById('client_pref_reason');if(reasonEl)answers['client_pref_reason']=reasonEl.value;
  const pathways=computePathways();
  const btn=document.getElementById('submit-btn');btn.disabled=true;btn.textContent='Saving to Bitrix24...';
  const summary=['=== IMMIGRATION PATHWAY ASSESSMENT ===',`Pathway #1: ${pathways[0]?.name||''}`,`Pathway #2: ${pathways[1]?.name||''}`,`Pathway #3: ${pathways[2]?.name||''}`,`Client preferred: ${answers['pref_pathway']||'Not selected'}`,`Client reason: ${answers['client_pref_reason']||''}`,`Notes: ${answers['client_goal']||''}`,``,`=== ANSWERS ===`,`Age: ${answers['q1']||''}`,`Country: ${answers['q2']||''}`,`Marital Status: ${answers['q3']||''}`,answers['q3']==='Married'?`Spouse: ${answers['spouse_name']||''} | Country: ${answers['spouse_country']||''} | Edu: ${answers['spouse_edu']||''} | Exp: ${answers['spouse_exp']||''} | Immigrating: ${answers['spouse_immigrate']||''}`:'',`Children under 21: ${answers['has_children']||''} ${answers['children_count']?'('+answers['children_count']+')':''}`,`Primary Goal: ${answers['q4']||''}`,`Education: ${answers['q5']||''}`,`Field: ${answers['q6']||''}`,`Experience: ${answers['q7']||''}`,`Leadership: ${answers['q8']||''}`,`Recognition: ${(answers['q9']||[]).join(', ')}`,`Situation: ${answers['q10']||''}`,`Business Interest: ${answers['q11']||''}`,`Investment Level: ${answers['q12']||''}`,`Study Interest: ${answers['q13']||''}`,`Family in USA: ${answers['q14']||''}`,``,`Agent intro notes: ${answers['intro_notes']||''}`].filter(l=>l!==undefined).join('\n');
  const fields={COMMENTS:summary};
  if(answers['q2'])fields['UF_CRM_1449131599']=answers['q2'];
  if(answers['q3']&&MARITAL_IDS[answers['q3']])fields['UF_CRM_1500181612']=MARITAL_IDS[answers['q3']];
  if(answers['q5']&&EDU_IDS[answers['q5']])fields['UF_CRM_1484914608']=EDU_IDS[answers['q5']];
  if(answers['q6'])fields['UF_CRM_1709560603']=answers['q6'];
  if(answers['q12'])fields['UF_CRM_1709560465']=answers['q12'];
  fields['STATUS_ID']='TypeForm';
  if(!leadId){showResult(true,summary,pathways);return;}
  try{const url=`${WEBHOOK}crm.lead.update?ID=${leadId}&`+Object.entries(fields).map(([k,v])=>`fields[${k}]=${encodeURIComponent(v)}`).join('&');const res=await fetch(url);const data=await res.json();if(data.result){showResult(true,summary,pathways);}else{showResult(false,summary,pathways,JSON.stringify(data.error_description||data));}}catch(e){showResult(false,summary,pathways,e.message);}
}

function showResult(success,summary,pathways,err){
  const main=document.getElementById('main');
  if(success){main.innerHTML=`<div class="status-box"><div class="status-icon">✅</div><div class="status-title" style="color:#15803d">Lead Updated Successfully</div><div class="status-sub">The assessment results have been saved to Bitrix24.<br><br><strong>Pathways identified:</strong><br>${pathways.map((p,i)=>`${i+1}. ${p.name}`).join('<br>')}${leadId?`<br><br>Lead ID: ${leadId}`:''}</div></div>`;}
  else{main.innerHTML=`<div class="status-box"><div class="status-icon">⚠️</div><div class="status-title" style="color:#b45309">Saved Locally</div><div class="status-sub">Could not update Bitrix24${err?': '+err:''}.<br><br>Please copy the results below:<br><br><textarea class="textarea" style="font-size:11px;min-height:120px;text-align:left">${summary}</textarea></div></div>`;}
  document.getElementById('progress').style.width='100%';
}

async function loadLead(){
  if(!leadId)return;
  try{const res=await fetch(`${WEBHOOK}crm.lead.get?ID=${leadId}`);const data=await res.json();if(data.result){const ld=data.result;clientName=[ld.NAME,ld.LAST_NAME].filter(Boolean).join(' ')||'Client';const initials=clientName.split(' ').map(n=>n[0]).join('').substring(0,2).toUpperCase();document.getElementById('client-initials').textContent=initials;document.getElementById('client-name-display').textContent=clientName;document.getElementById('client-info-display').textContent=[ld.PHONE?.[0]?.VALUE,ld.EMAIL?.[0]?.VALUE].filter(Boolean).join(' · ');document.getElementById('client-bar').style.display='flex';}}catch(e){console.log('Could not load lead:',e);}
}

loadLead();
render();
</script>
</body>
</html>
